<div class="min-h-screen bg-base-200 p-8 flex items-center justify-center">
    <div class="max-w-md w-full space-y-6">
        <!-- Header -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-base-content">Welcome Back</h2>
            <p class="text-base-content/70 mt-2">Please enter your details to continue</p>
        </div>

        <!-- Search Input - With clear purpose and helper text -->
        <div class="form-control w-full">
            <label class="label">
                <span class="label-text font-medium">Search</span>
                <span class="label-text-alt text-base-content/60">Optional</span>
            </label>
            <label
                class="input input-bordered flex items-center gap-2 focus-within:outline-primary transition-all duration-200 hover:border-primary/50">
                <input type="text" class="grow" placeholder="Search for anything..." />
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                    class="h-4 w-4 opacity-50">
                    <path fill-rule="evenodd"
                        d="M9.965 11.026a5 5 0 1 1 1.06-1.06l2.755 2.754a.75.75 0 1 1-1.06 1.06l-2.755-2.754ZM10.5 7a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0Z"
                        clip-rule="evenodd" />
                </svg>
            </label>
            <label class="label">
                <span class="label-text-alt text-base-content/60">Try searching for "products" or "users"</span>
            </label>
        </div>

        <!-- Email Input - With validation indicator -->
        <div class="form-control w-full">
            <label class="label">
                <span class="label-text font-medium">Email Address</span>
                <span class="label-text-alt text-base-content/60">Required</span>
            </label>
            <label
                class="input input-bordered flex items-center gap-2 focus-within:outline-primary transition-all duration-200 hover:border-primary/50 group">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                    class="h-4 w-4 opacity-50 group-focus-within:opacity-100 group-focus-within:text-primary transition-all">
                    <path
                        d="M2.5 3A1.5 1.5 0 0 0 1 4.5v.793c.026.009.051.02.076.032L7.674 8.51c.206.1.446.1.652 0l6.598-3.185A.755.755 0 0 1 15 5.293V4.5A1.5 1.5 0 0 0 13.5 3h-11Z" />
                    <path
                        d="M15 6.954 8.978 9.86a2.25 2.25 0 0 1-1.956 0L1 6.954V11.5A1.5 1.5 0 0 0 2.5 13h11a1.5 1.5 0 0 0 1.5-1.5V6.954Z" />
                </svg>
                <input type="email" class="grow" placeholder="you@example.com" />
                <!-- Success indicator (hidden by default, show when valid) -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
                    class="h-5 w-5 text-success hidden">
                    <path fill-rule="evenodd"
                        d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z"
                        clip-rule="evenodd" />
                </svg>
            </label>
            <label class="label">
                <span class="label-text-alt text-base-content/60">We'll never share your email</span>
            </label>
        </div>

        <!-- Username Input - With character counter -->
        <div class="form-control w-full">
            <label class="label">
                <span class="label-text font-medium">Username</span>
                <span class="label-text-alt text-base-content/60">3-20 characters</span>
            </label>
            <label
                class="input input-bordered flex items-center gap-2 focus-within:outline-primary transition-all duration-200 hover:border-primary/50">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                    class="h-4 w-4 opacity-50">
                    <path
                        d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM12.735 14c.618 0 1.093-.561.872-1.139a6.002 6.002 0 0 0-11.215 0c-.22.578.254 1.139.872 1.139h9.47Z" />
                </svg>
                <input type="text" class="grow" placeholder="Choose a username" maxlength="20" />
                <span class="text-xs text-base-content/40">0/20</span>
            </label>
        </div>

        <!-- Password Input - With strength indicator and toggle -->
        <div class="form-control w-full">
            <label class="label">
                <span class="label-text font-medium">Password</span>
                <span class="label-text-alt text-base-content/60">Required</span>
            </label>
            <label
                class="input input-bordered flex items-center gap-2 focus-within:outline-primary transition-all duration-200 hover:border-primary/50 relative">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                    class="h-4 w-4 opacity-50">
                    <path fill-rule="evenodd"
                        d="M14 6a4 4 0 0 1-4.899 3.899l-1.955 1.955a.5.5 0 0 1-.353.146H5v1.5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-2.293a.5.5 0 0 1 .146-.353l3.955-3.955A4 4 0 1 1 14 6Zm-4-2a.75.75 0 0 0 0 1.5.5.5 0 0 1 .5.5.75.75 0 0 0 1.5 0 2 2 0 0 0-2-2Z"
                        clip-rule="evenodd" />
                </svg>
                <input type="password" class="grow" placeholder="Enter your password" value="password" />
                <!-- Password visibility toggle -->
                <button type="button" class="btn btn-xs btn-ghost btn-square">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="h-4 w-4">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    </svg>
                </button>
            </label>
            <!-- Password strength indicator -->
            <div class="mt-2 space-y-1">
                <div class="flex gap-1 h-1">
                    <div class="flex-1 bg-error rounded-l-full"></div>
                    <div class="flex-1 bg-base-300"></div>
                    <div class="flex-1 bg-base-300"></div>
                    <div class="flex-1 bg-base-300 rounded-r-full"></div>
                </div>
                <div class="flex justify-between text-xs text-base-content/60">
                    <span>Weak password</span>
                    <span>Use 8+ characters with mix</span>
                </div>
            </div>
        </div>

        <!-- Additional options -->
        <div class="flex items-center justify-between">
            <label class="label cursor-pointer gap-2">
                <input type="checkbox" checked class="checkbox checkbox-primary checkbox-sm" />
                <span class="label-text">Remember me</span>
            </label>
            <a href="#" class="link link-primary link-hover text-sm">Forgot password?</a>
        </div>

        <!-- Action buttons -->
        <div class="space-y-3 mt-8">
            <button class="btn btn-primary w-full">Sign In</button>
            <button class="btn btn-outline w-full">Create Account</button>
        </div>

        <!-- Social login (optional) -->
        <div class="divider text-base-content/60">OR CONTINUE WITH</div>
        <div class="grid grid-cols-3 gap-3">
            <button class="btn btn-outline">
                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
            </button>
            <button class="btn btn-outline">
                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M13.397 20.997v-8.196h2.765l.411-3.209h-3.176V7.548c0-.926.258-1.56 1.587-1.56h1.684V3.127A22.336 22.336 0 0 0 14.201 3c-2.444 0-4.122 1.492-4.122 4.231v2.355H7.332v3.209h2.753v8.202h3.312z" />
                </svg>
            </button>
            <button class="btn btn-outline">
                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.937 4.937 0 004.604 3.417 9.868 9.868 0 01-6.102 2.104c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 0021.748-3.384 13.92 13.92 0 001.55-5.968c0-.21-.005-.42-.015-.63A9.935 9.935 0 0024 4.59z" />
                </svg>
            </button>
        </div>
    </div>
</div>
