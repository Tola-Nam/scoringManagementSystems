<div class="flex items-center justify-center min-h-screen bg-gray-100 p-4">
    <div class="w-full max-w-md bg-white p-6 rounded-2xl shadow-lg">
        <h2 class="text-2xl font-semibold text-center mb-6">Welcome back</h2>

        <form [formGroup]="signinForm" (ngSubmit)="handleSigninAdminPage()">

            <!-- EMAIL -->
            <fieldset class="fieldset w-full mb-4">
                <label class="label">Email</label>
                <div class="relative">
                    <!-- Input -->
                    <input type="email" formControlName="email" placeholder="Email"
                        class="input validator w-full pl-10 rounded-full" />
                    <!-- Icon -->
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 pointer-events-none">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                </div>

                <!-- Error -->
                <p class="text-error text-sm mt-1" *ngIf="emailControl?.invalid && emailControl?.touched">
                    Email is required
                </p>
            </fieldset>

            <!-- PASSWORD -->
            <fieldset class="fieldset w-full mb-4">
                <label class="label">Password</label>

                <div class="relative">

                    <!-- Left Icon -->
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 pointer-events-none">
                        <i class="fa-solid fa-lock"></i>
                    </span>

                    <!-- Input -->
                    <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Password"
                        class="input validator w-full pl-10 pr-10 rounded-full" />

                    <!-- Right Icon -->
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer text-gray-500"
                        (click)="showPassword = !showPassword">
                        <i [class]="showPassword ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye'"></i>
                    </span>

                </div>

                <!-- ✅ Move error OUTSIDE -->
                <p class="text-error text-sm mt-1" *ngIf="passwordControl?.invalid && passwordControl?.touched">
                    Must be at least 8 characters with uppercase, lowercase, and number
                </p>

            </fieldset>

            <!-- BUTTON -->
            <button class="btn btn-primary w-full mt-4" [disabled]="signinForm.invalid">
                Sign In
            </button>

        </form>
    </div>
</div>
